<section class="about section" id="about-me" aria-labelledby="about-title">
  <div class="about__container">
    <div class="about__image-wrapper">
      <img
        class="about__image"
        src="img/beispiel_men_sitting_on_desk.jpg"
        [alt]="text().imageAlt"
      />
    </div>

    <div class="about__content">
      <p class="about__label">{{ text().label }}</p>

      <article class="about__card">
        <h2 id="about-title">{{ text().title }}</h2>

        <div class="about__text-content">
          <p class="about__intro">{{ text().intro }}</p>

          <div class="about__highlights">
            <div class="about__highlight">
              <img class="about__highlight-icon" src="icons/highlights/location_on.svg" alt="" />
              <p>{{ text().location }}</p>
            </div>

            <div class="about__highlight">
              <img class="about__highlight-icon" src="icons/highlights/cognition.svg" alt="" />
              <p>{{ text().mindset }}</p>
            </div>

            <div class="about__highlight">
              <img class="about__highlight-icon" src="icons/highlights/quality.svg" alt="" />
              <p>{{ text().quality }}</p>
            </div>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
