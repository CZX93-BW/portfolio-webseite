<section class="testimonials section" aria-labelledby="testimonials-title" id="testimonials">
  <h2 id="testimonials-title" class="testimonials__title">
    {{ text().title }}
  </h2>

  <div class="testimonials__carousel" [attr.aria-label]="text().carouselLabel">
    <div class="testimonials__fade" aria-hidden="true"></div>

    <div class="testimonials__track">
      @for (testimonial of testimonials(); track testimonial.id; let index = $index) {
        <article class="testimonials__card" [class]="getCardClass(index)">
          @if (index === activeIndex) {
            <img class="testimonials__quotes" src="icons/highlights/quotes.svg" alt="" aria-hidden="true" />
          }

          <p class="testimonials__quote">{{ testimonial.quote }}</p>

          <footer class="testimonials__footer">
            <span class="testimonials__line" aria-hidden="true"></span>
            <p>{{ testimonial.author }} - {{ testimonial.role }}</p>
          </footer>
        </article>
      }
    </div>

    <div class="testimonials__controls" [attr.aria-label]="text().controlsLabel">
      <button
        class="testimonials__arrow"
        type="button"
        [attr.aria-label]="text().previousLabel"
        (click)="showPreviousTestimonial()"
      >
        <img src="icons/highlights/arrows_left.svg" alt="" aria-hidden="true" />
      </button>

      <div class="testimonials__dots" aria-label="Select testimonial">
        @for (testimonial of testimonials(); track testimonial.id; let index = $index) {
          <button
            class="testimonials__dot"
            type="button"
            [class.testimonials__dot--active]="index === activeIndex"
            [attr.aria-label]="text().selectLabel + ' ' + (index + 1)"
            [attr.aria-current]="index === activeIndex"
            (click)="selectTestimonial(index)"
          ></button>
        }
      </div>

      <button
        class="testimonials__arrow"
        type="button"
        [attr.aria-label]="text().nextLabel"
        (click)="showNextTestimonial()"
      >
        <img src="icons/highlights/arrows_right.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  </div>
</section>
