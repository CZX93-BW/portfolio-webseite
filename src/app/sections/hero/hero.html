<section class="hero" id="home" aria-labelledby="hero-title">
  <div class="hero__center">
    <p class="hero__role">{{ text().role }}</p>

    <h1 id="hero-title" class="hero__title">{{ text().title }}</h1>

    <div class="hero__actions">
      <a class="button hero__button" href="#projects">
        <span>{{ text().workButton }}</span>
      </a>
      <a class="button hero__button" href="#contact">
        <span>{{ text().contactButton }}</span>
      </a>
    </div>
  </div>

  <div class="hero__left-lateral">
    <a class="hero__scroll-link" href="#about-me" aria-label="Scroll to about me">
      <img
        class="hero__scroll-icon hero__scroll-icon--default"
        src="icons/highlights/scroll_down.svg"
        alt=""
      />
      <img
        class="hero__scroll-icon hero__scroll-icon--drive"
        src="icons/highlights/scroll_down_drive.svg"
        alt=""
      />
    </a>
    <span class="hero__vertical-line hero__vertical-line--green"></span>
  </div>

  <aside class="hero__right-lateral" [attr.aria-label]="text().contactLinksLabel">
    <a class="hero__email" href="mailto:bastian-wollny@web.de">
      bastian-wollny@web.de
    </a>

    <div class="hero__social-links">
      <a class="hero__social-link" href="https://github.com/CZX93-BW" [attr.aria-label]="text().githubLabel">
        <img src="icons/social/github.svg" alt="" />
      </a>

      <a class="hero__social-link" href="https://www.linkedin.com/in/bastian-wollny" [attr.aria-label]="text().linkedinLabel">
        <img src="icons/social/linkedin.svg" alt="" />
      </a>
    </div>

    <span class="hero__vertical-line"></span>
  </aside>

  <div class="hero__marquee" aria-hidden="true">
    <div class="hero__marquee-track">
      @for (item of marqueeItems(); track $index) {
        <span>{{ item }}</span>
        <span class="hero__marquee-dot"></span>
      }
    </div>
  </div>
</section>
