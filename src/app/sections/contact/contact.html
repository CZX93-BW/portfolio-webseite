<section class="contact section" aria-labelledby="contact-title">
  <div class="contact__container">
    <div class="contact__content">
      <p class="contact__label">{{ text().label }}</p>

      <h2 id="contact-title">{{ text().title }}</h2>

      <div class="contact__text">
        <h3>{{ text().problemTitle }}</h3>
        <p>{{ text().intro }}</p>

        <p>
          {{ text().needDeveloper }}
          <a href="#contact">{{ text().talkLink }}</a>
        </p>
      </div>
    </div>

    <form class="contact__form" [formGroup]="contactForm" (ngSubmit)="submitContactForm()" novalidate>
      <label class="contact__field">
        <span>{{ text().nameLabel }}</span>
        <input type="text" formControlName="name" [placeholder]="text().namePlaceholder" autocomplete="name" />
        <small class="contact__error">
          @if (shouldShowError('name')) {
            {{ text().nameError }}
          }
        </small>
      </label>

      <label class="contact__field">
        <span>{{ text().emailLabel }}</span>
        <input type="email" formControlName="email" [placeholder]="text().emailPlaceholder" autocomplete="email" />
        <small class="contact__error">
          @if (shouldShowError('email')) {
            {{ text().emailError }}
          }
        </small>
      </label>

      <label class="contact__field">
        <span>{{ text().messageLabel }}</span>
        <textarea formControlName="message" [placeholder]="text().messagePlaceholder" rows="3"></textarea>
        <small class="contact__error">
          @if (shouldShowError('message')) {
            {{ text().messageError }}
          }
        </small>
      </label>

      <div class="contact__privacy">
        <label class="contact__checkbox">
          <input type="checkbox" formControlName="privacyAccepted" />
          <span class="contact__custom-checkbox" aria-hidden="true"></span>

          <span>
            {{ text().privacyStart }}
            <a routerLink="/privacy-policy">{{ text().privacyLink }}</a>
            {{ text().privacyEnd }}
          </span>
        </label>

        <small class="contact__privacy-error">
          @if (shouldShowError('privacyAccepted')) {
            {{ text().privacyError }}
          }
        </small>
      </div>

      <button class="contact__button" type="submit" [disabled]="contactForm.invalid || isSending">
        @if (isSending) {
          {{ text().sending }}
        } @else {
          {{ text().submit }}
        }
      </button>

      <p class="contact__feedback" aria-live="polite">
        @if (sendSuccess) {
          {{ text().success }}
        }

        @if (sendError) {
          {{ text().error }}
        }
      </p>
    </form>
  </div>
</section>
