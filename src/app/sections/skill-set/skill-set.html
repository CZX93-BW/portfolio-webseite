<section class="skills section" id="skills" aria-labelledby="skills-title">
  <div class="skills__container">
    <div class="skills__content">
      <p class="skills__label">{{ text().label }}</p>

      <article class="skills__card">
        <h2 id="skills-title">{{ text().title }}</h2>

        <div class="skills__text-content">
          <p class="skills__intro">{{ text().intro }}</p>

          <div class="skills__contact">
            <h3>{{ text().questionStart }} <span>{{ text().questionHighlight }}</span></h3>
            <p>{{ text().contact }}</p>
          </div>

          <a class="button skills__button" href="#contact">{{ text().button }}</a>
        </div>
      </article>
    </div>

    <div class="skills__grid" [attr.aria-label]="text().ariaLabel">
      @for (skill of skills; track skill.name) {
        <article class="skills__item">
          <img class="skills__icon" [src]="skill.iconPath" [alt]="skill.name" />
          <p>{{ skill.name }}</p>
        </article>
      }
    </div>
  </div>
</section>
