<header class="header">
  <div class="header__content">
    <div class="header__left">
      <div class="header__language-switch" [attr.aria-label]="text().languageLabel">
        <button
          class="header__language-option"
          [class.header__language-option--active]="isCurrentLanguage('en')"
          [attr.aria-pressed]="isCurrentLanguage('en')"
          type="button"
          (click)="setLanguage('en')"
        >
          EN
        </button>

        <button
          class="header__language-option"
          [class.header__language-option--active]="isCurrentLanguage('de')"
          [attr.aria-pressed]="isCurrentLanguage('de')"
          type="button"
          (click)="setLanguage('de')"
        >
          DE
        </button>
      </div>

      <nav class="header__navigation" [attr.aria-label]="text().navigationLabel">
        <a class="header__navigation-link" routerLink="/" fragment="about-me" (click)="closeMobileMenu()">
          {{ text().aboutMe }}
        </a>

        <a class="header__navigation-link" routerLink="/" fragment="skills" (click)="closeMobileMenu()">
          {{ text().skills }}
        </a>

        <a class="header__navigation-link" routerLink="/" fragment="projects" (click)="closeMobileMenu()">
          {{ text().projects }}
        </a>
      </nav>
    </div>

    <button
      class="header__menu-button"
      type="button"
      aria-label="Open navigation menu"
      [class.header__menu-button--open]="isMobileMenuOpen()"
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="toggleMobileMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <a
      class="header__logo"
      routerLink="/"
      fragment="home"
      [attr.aria-label]="text().homepageLabel"
      (click)="closeMobileMenu()"
    >
      <img class="header__logo-image" src="img/bw_logo.png" alt="" aria-hidden="true" />
    </a>

    <nav
      class="header__mobile-menu"
      [class.header__mobile-menu--open]="isMobileMenuOpen()"
      [attr.aria-label]="text().navigationLabel"
    >
      <a class="header__mobile-link" routerLink="/" fragment="about-me" (click)="closeMobileMenu()">
        {{ text().aboutMe }}
      </a>

      <a class="header__mobile-link" routerLink="/" fragment="skills" (click)="closeMobileMenu()">
        {{ text().skills }}
      </a>

      <a class="header__mobile-link" routerLink="/" fragment="projects" (click)="closeMobileMenu()">
        {{ text().projects }}
      </a>

      <div class="header__mobile-language-switch" [attr.aria-label]="text().languageLabel">
        <button
          class="header__mobile-language-option"
          [class.header__mobile-language-option--active]="isCurrentLanguage('en')"
          [attr.aria-pressed]="isCurrentLanguage('en')"
          type="button"
          (click)="setLanguage('en')"
        >
          EN
        </button>

        <button
          class="header__mobile-language-option"
          [class.header__mobile-language-option--active]="isCurrentLanguage('de')"
          [attr.aria-pressed]="isCurrentLanguage('de')"
          type="button"
          (click)="setLanguage('de')"
        >
          DE
        </button>
      </div>
    </nav>
  </div>
</header>
