<footer class="footer">
  <div class="footer__container">
    <div class="footer__brand">
      <a class="footer__logo" routerLink="/" fragment="home" [attr.aria-label]="text().homepageLabel">
        <span>B</span>
        <span>W</span>
      </a>

      <div class="footer__info">
        <p>{{ text().role }}</p>
        <p>{{ text().location }}</p>
      </div>
    </div>

    <p class="footer__copyright">{{ text().copyright }}</p>

    <nav class="footer__navigation" [attr.aria-label]="text().navigationLabel">
      @for (link of footerLinks(); track link.label) {
        @if (link.routerLink) {
          <a class="footer__link" [routerLink]="link.routerLink">
            {{ link.label }}
          </a>
        } @else {
          <a class="footer__link" [href]="link.href">
            {{ link.label }}
          </a>
        }
      }
    </nav>
  </div>
</footer>
