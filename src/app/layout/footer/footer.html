<footer class="footer">
  <div class="footer__container">
    <div class="footer__brand">
      <a class="footer__logo" routerLink="/" aria-label="Back to homepage">
        <span>B</span>
        <span>W</span>
      </a>

      <div class="footer__info">
        <p>Fullstack Developer</p>
        <p>Bottrop Germany</p>
      </div>
    </div>

    <p class="footer__copyright">© Bastian Wollny 2026</p>

    <nav class="footer__navigation" aria-label="Footer navigation">
      @for (link of footerLinks; track link.label) {
        @if (link.routerLink) {
          <a class="footer__link" [routerLink]="link.routerLink">
            {{ link.label }}
          </a>
        } @else {
          <a class="footer__link" [href]="link.href">
            {{ link.label }}
          </a>
        }
      }
    </nav>
  </div>
</footer>
